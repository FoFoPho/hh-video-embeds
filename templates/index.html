<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hammer Haag — Video Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div id="sparks-layer"></div>

  <header class="site-header">
    <div class="header-inner">
      <img src="{{ url_for('static', filename='images/hhs-logo-white.png') }}" alt="Hammer Haag Steel" class="site-logo">
      <div class="header-title-block">
        <h1 class="site-title">Video Library</h1>
        <p class="site-sub">Hammer Haag Steel</p>
      </div>
    </div>
    <div class="header-bar"></div>
  </header>

  <main class="main-content">

    <div id="state-loading" class="state-panel">
      <div class="gear-spinner">
        <svg viewBox="0 0 64 64" class="gear" aria-hidden="true">
          <path d="M32 20a12 12 0 1 0 0 24 12 12 0 0 0 0-24zm0 18a6 6 0 1 1 0-12 6 6 0 0 1 0 12z"/>
          <path d="M54.3 35.4l-3.5-.6a19.2 19.2 0 0 0-1.3-3.1l2.1-2.9a2 2 0 0 0-.2-2.6l-3.6-3.6a2 2 0 0 0-2.6-.2l-2.9 2.1a19.2 19.2 0 0 0-3.1-1.3l-.6-3.5A2 2 0 0 0 36.6 18h-5.1a2 2 0 0 0-2 1.7l-.6 3.5a19.2 19.2 0 0 0-3.1 1.3l-2.9-2.1a2 2 0 0 0-2.6.2l-3.6 3.6a2 2 0 0 0-.2 2.6l2.1 2.9a19.2 19.2 0 0 0-1.3 3.1l-3.5.6A2 2 0 0 0 12 37.4v5.1a2 2 0 0 0 1.7 2l3.5.6a19.2 19.2 0 0 0 1.3 3.1l-2.1 2.9a2 2 0 0 0 .2 2.6l3.6 3.6a2 2 0 0 0 2.6.2l2.9-2.1a19.2 19.2 0 0 0 3.1 1.3l.6 3.5A2 2 0 0 0 31.4 62h5.1a2 2 0 0 0 2-1.7l.6-3.5a19.2 19.2 0 0 0 3.1-1.3l2.9 2.1a2 2 0 0 0 2.6-.2l3.6-3.6a2 2 0 0 0 .2-2.6l-2.1-2.9a19.2 19.2 0 0 0 1.3-3.1l3.5-.6A2 2 0 0 0 56 42.6v-5.1a2 2 0 0 0-1.7-2.1z"/>
        </svg>
      </div>
      <p class="state-label">Loading videos&hellip;</p>
    </div>

    <div id="state-error" class="state-panel hidden">
      <div class="error-icon">&#9888;</div>
      <p class="state-label" id="error-text">Failed to load videos.</p>
      <button class="retry-btn" onclick="loadVideos()">RETRY</button>
    </div>

    <div id="content" class="content hidden"></div>

  </main>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
